# Live-shop price/stock verification — runs every ~2 days, independent of the
# feed ingestion. Checks each AWIN deal against the merchant's live Shopify page
# and updates prices / removes sold-out or no-longer-discounted items, so deals
# stay accurate between the (lagging) daily feed pulls.
#
# Required repository secrets (same as the ingestion):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#
# Run manually from the Actions tab any time; tick "dry_run" to preview.
name: Verify AWIN deals

on:
  schedule:
    - cron: '0 5 */2 * *' # every 2nd day at 05:00 UTC (after the 03:00 ingest)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes)'
        type: boolean
        default: false

concurrency:
  group: verify-awin
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify deals against live shops
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/verify-awin.cjs
          else
            node scripts/verify-awin.cjs --apply
          fi
